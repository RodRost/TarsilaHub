<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarsila Hub — My Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FAFAF9;--surface:#FFFFFF;--surface-2:#F4F4F3;
  --ink:#0A0A0A;--ink-2:#3A3A3A;--muted:#888;
  --line:#E5E5E3;--line-soft:#EDEDE9;
  --accent:#2563EB;--accent-soft:#EFF6FF;
  --ok:#15803D;--ok-soft:#F0FDF4;--ok-border:#BBF7D0;
  --warn:#B45309;--warn-soft:#FFFBEB;--warn-border:#FDE68A;
  --crit:#B91C1C;--crit-soft:#FEF2F2;
  --r-md:8px;--r-lg:12px;--r-xl:16px;
  --shadow:0 1px 3px rgba(0,0,0,.08);
}
[data-theme="dark"]{
  --bg:#111110;--surface:#1A1A18;--surface-2:#222220;
  --ink:#F5F5F4;--ink-2:#B0B0A8;--muted:#666;
  --line:#2E2E2C;--line-soft:#252523;
  --accent:#3B82F6;--accent-soft:rgba(37,99,235,.15);
  --ok:#22C55E;--ok-soft:rgba(21,128,61,.12);--ok-border:#14532D;
  --warn:#F59E0B;--warn-soft:rgba(180,83,9,.12);--warn-border:#5A3A0A;
  --crit:#F87171;--crit-soft:rgba(185,28,28,.12);
}
body{font-family:'Geist',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;padding:0}
a{color:inherit;text-decoration:none}

/* Layout */
.page{max-width:680px;margin:0 auto;padding:32px 20px 80px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px}
.brand{font-size:12px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted)}
.home-link{font-size:12px;color:var(--accent);display:flex;align-items:center;gap:4px}
.home-link:hover{text-decoration:underline}

/* Profile hero */
.profile-hero{display:flex;align-items:center;gap:20px;margin-bottom:28px}
.profile-photo{
  width:72px;height:72px;border-radius:50%;overflow:hidden;
  border:2px solid var(--line);flex-shrink:0;
  background:var(--surface-2);display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:600;color:var(--muted);
}
.profile-photo img{width:100%;height:100%;object-fit:cover}
.profile-name{font-size:24px;font-weight:600;letter-spacing:-0.02em;margin-bottom:4px}
.profile-role{font-size:14px;color:var(--muted)}
.profile-status{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:500;margin-top:6px;padding:3px 10px;border-radius:999px}
.profile-status.alert{background:var(--crit-soft);color:var(--crit)}
.profile-status.watch{background:var(--warn-soft);color:var(--warn)}
.profile-status.steady{background:var(--ok-soft);color:var(--ok)}
.profile-status::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor}

/* Sections */
.section{margin-bottom:28px}
.section-title{font-size:11px;font-weight:500;letter-spacing:0.05em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:16px 18px}

/* Signals */
.signals-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.signal-card{background:var(--surface-2);border-radius:var(--r-md);padding:12px 14px}
.signal-label{font-size:10px;font-weight:500;letter-spacing:0.04em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.signal-val{font-size:20px;font-weight:600;letter-spacing:-0.02em;line-height:1}
.signal-sub{font-size:11.5px;margin-top:4px}
.signal-sub.ok{color:var(--ok)}
.signal-sub.warn{color:var(--warn)}
.signal-sub.crit{color:var(--crit)}

/* Energy history */
.history-bar{display:flex;gap:3px;height:40px;align-items:flex-end;margin-top:4px}
.history-day{flex:1;border-radius:2px 2px 0 0;min-height:4px}
.history-day.ok{background:var(--ok)}
.history-day.warn{background:var(--warn)}
.history-day.crit{background:var(--crit)}

/* Projects */
.proj-list{display:flex;flex-wrap:wrap;gap:6px}
.proj-chip{padding:4px 10px;border-radius:999px;font-size:12px;font-weight:500;border:1px solid var(--line);background:var(--surface-2);color:var(--ink-2)}

/* Skills */
.skill-list{display:flex;flex-direction:column;gap:8px}
.skill-row{display:flex;align-items:center;gap:10px}
.skill-name{font-size:13px;width:150px;flex-shrink:0;color:var(--ink-2)}
.skill-bar-wrap{flex:1;height:6px;background:var(--surface-2);border-radius:999px;overflow:hidden}
.skill-bar-fill{height:100%;border-radius:999px;background:var(--accent)}
.skill-lvl{font-size:11.5px;color:var(--muted);min-width:50px;text-align:right}

/* Achievements */
.achievement-list{display:flex;flex-direction:column;gap:0}
.ach-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--line-soft)}
.ach-item:last-child{border-bottom:none;padding-bottom:0}
.ach-month{font-size:10px;font-weight:500;letter-spacing:0.04em;text-transform:uppercase;color:var(--muted);min-width:28px;padding-top:2px}
.ach-body{flex:1;min-width:0}
.ach-title{font-size:13px;font-weight:500;margin-bottom:4px;line-height:1.35}
.ach-tags{display:flex;flex-wrap:wrap;gap:4px}
.ach-tag{font-size:10.5px;padding:2px 7px;border-radius:999px;border:1px solid var(--line);background:var(--surface-2);color:var(--ink-2)}
.ach-tag.skill{background:var(--accent-soft);color:var(--accent);border-color:var(--accent)}
.ach-tag.type-leadership{background:var(--ok-soft);color:var(--ok);border-color:var(--ok-border)}
.ach-tag.type-learning{background:var(--warn-soft);color:var(--warn);border-color:var(--warn-border)}
.ach-tag.type-visibility{background:var(--crit-soft);color:var(--crit)}
.ach-impact{font-size:11.5px;color:var(--muted);margin-top:4px;padding-left:8px;border-left:2px solid var(--line)}

/* Loading / error */
.state-msg{padding:40px;text-align:center;color:var(--muted);font-size:13.5px}
.state-msg b{display:block;font-size:18px;font-weight:600;color:var(--ink);margin-bottom:8px;letter-spacing:-0.01em}

/* Selector */
.selector-wrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-xl);padding:32px;max-width:400px;margin:60px auto 0;text-align:center}
.selector-title{font-size:20px;font-weight:600;letter-spacing:-0.02em;margin-bottom:6px}
.selector-sub{font-size:13.5px;color:var(--muted);margin-bottom:20px}
.selector-search{width:100%;padding:10px 14px;font-size:14px;font-family:inherit;border:1px solid var(--line);border-radius:var(--r-md);background:var(--surface-2);color:var(--ink);outline:none;transition:border-color .12s;margin-bottom:8px}
.selector-search:focus{border-color:var(--accent)}
.selector-list{max-height:220px;overflow-y:auto;border:1px solid var(--line);border-radius:var(--r-md);background:var(--surface);text-align:left;display:none}
.selector-list.open{display:block}
.selector-item{padding:10px 14px;font-size:13.5px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .08s}
.selector-item:hover{background:var(--surface-2)}
.sel-avatar{width:28px;height:28px;border-radius:50%;background:var(--surface-2);border:1px solid var(--line);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--muted)}
.sel-avatar img{width:100%;height:100%;object-fit:cover}
@media print {
  .header, .home-link, .selector-wrap,
  button:not(.profile-status) { display:none !important; }
  body { background:white !important; color:black !important; padding:0; }
  .page { padding:16px; max-width:100%; }
  .card { box-shadow:none !important; border:1px solid #ddd !important; break-inside:avoid; }
  .section { margin-bottom:16px; }
  a { color:inherit !important; }
}
</style>
</head>
<body>

<div class="page" id="page">
  <div class="header">
    <span class="brand">Tarsila Hub</span>
    <a href="index.html" class="home-link">← Dashboard</a>
  </div>
  <div id="content">
    <div class="selector-wrap" id="selectorWrap">
      <div class="selector-title">My profile</div>
      <div class="selector-sub">Search your name to view your profile</div>
      <input class="selector-search" id="selectorSearch" placeholder="Start typing your name…" autocomplete="off">
      <div class="selector-list" id="selectorList"></div>
    </div>
  </div>
</div>

<script>
const SB_URL = 'https://rlwoxwrsxhpjsndzxeut.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJsd294d3JzeGhwanNuZHp4ZXV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NjUyMzAsImV4cCI6MjA5MjE0MTIzMH0.6ZoQyj8Y6Xqvf9I-Yog1D4IuxJ7bG65yi7iazHZyY4w
';

let allDesigners = [];
let currentDesigner = null;

if(window.matchMedia('(prefers-color-scheme: dark)').matches)
  document.documentElement.setAttribute('data-theme','dark');

function sbXhr(method, path, body){
  return new Promise((resolve, reject) => {
    if(!SB_URL || !SB_KEY){ reject(new Error('Supabase not configured')); return; }
    const xhr = new XMLHttpRequest();
    xhr.open(method, `${SB_URL}/rest/v1/${path}`, true);
    xhr.setRequestHeader('apikey', SB_KEY);
    xhr.setRequestHeader('Authorization', 'Bearer ' + SB_KEY);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.setRequestHeader('Accept', 'application/json');
    xhr.timeout = 10000;
    xhr.onload = () => {
      if(xhr.status >= 200 && xhr.status < 300){
        try{ resolve(xhr.responseText ? JSON.parse(xhr.responseText) : null); }catch(e){ resolve(null); }
      } else {
        let msg = `HTTP ${xhr.status}`;
        try{ const j=JSON.parse(xhr.responseText); msg=j.message||j.error||msg; }catch(e){}
        reject(new Error(msg));
      }
    };
    xhr.onerror = () => reject(new Error('Network error'));
    xhr.ontimeout = () => reject(new Error('Timeout'));
    xhr.send(body ? JSON.stringify(body) : null);
  });
}

function avatarUrl(name){
  return `https://api.dicebear.com/9.x/notionists/svg?seed=${encodeURIComponent(name)}&backgroundColor=f4f4f3&backgroundType=solid`;
}

async function loadDesigners(){
  if(!SB_URL || !SB_KEY){
    document.getElementById('content').innerHTML = `<div class="state-msg"><b>Setup required</b>Edit <code>SB_URL</code> and <code>SB_KEY</code> in this file to connect to Supabase.</div>`;
    return;
  }
  try {
    const rows = await sbXhr('GET', 'designers?archived=eq.false&order=name&select=*');
    allDesigners = rows || [];
    // Check URL param
    const params = new URLSearchParams(window.location.search);
    const idParam = params.get('id');
    if(idParam){
      const d = allDesigners.find(x => String(x.id) === idParam);
      if(d){ renderProfile(d); return; }
    }
    setupSelector();
  } catch(e){
    document.getElementById('content').innerHTML = `<div class="state-msg"><b>Could not load</b>${e.message}</div>`;
  }
}

function setupSelector(){
  const search = document.getElementById('selectorSearch');
  const list   = document.getElementById('selectorList');
  search.addEventListener('input', () => {
    const q = search.value.trim().toLowerCase();
    const matches = q ? allDesigners.filter(d => d.name.toLowerCase().includes(q)) : [];
    if(!matches.length){ list.classList.remove('open'); return; }
    list.innerHTML = matches.map(d => `
      <div class="selector-item" onclick="selectDesigner(${d.id})">
        <div class="sel-avatar">
          <img src="${d.photo || avatarUrl(d.name)}" alt="${d.initials}"
            onerror="this.style.display='none';this.parentElement.textContent='${d.initials}'">
        </div>
        <div>
          <div style="font-weight:500;font-size:13.5px">${d.name}</div>
          <div style="font-size:11.5px;color:var(--muted)">${d.role}</div>
        </div>
      </div>`).join('');
    list.classList.add('open');
  });
  document.addEventListener('click', e => {
    if(!e.target.closest('#selectorWrap')) list.classList.remove('open');
  });
}

function selectDesigner(id){
  const d = allDesigners.find(x => x.id === id);
  if(!d) return;
  window.history.replaceState(null,'',`?id=${id}`);
  renderProfile(d);
}

function renderProfile(row){
  const LEVEL = ['—','Learning','Applying','Leading','Teaching'];
  const TYPE_LABELS = {craft:'Craft',leadership:'Leadership',learning:'Learning',visibility:'Visibility',collaboration:'Collaboration'};

  const d = {
    id:           row.id,
    name:         row.name,
    initials:     row.initials,
    role:         row.role,
    status:       row.status,
    load:         row.load,
    energy:       row.energy || 'steady',
    meetingLoad:  row.meeting_load || 'balanced',
    context:      row.context,
    pto:          row.pto,
    photo:        row.photo || '',
    skills:       row.skills || [],
    achievements: row.achievements || [],
    history:      row.history || [3,3,3,3,3,3,3],
  };

  const energyLabel = {high:'High energy',steady:'Steady',low:'Low energy'};
  const energyCls   = {high:'ok',steady:'warn',low:'crit'};
  const mlLabel = {low:'Mostly deep work','balanced':'Balanced','heavy':'Meeting-heavy','very-heavy':'Almost no deep work'};

  const historyHtml = (d.history||[]).map(v => {
    const cls = v>=4?'ok':v>=3?'warn':'crit';
    const h   = Math.round((v/5)*100);
    return `<div class="history-day ${cls}" style="height:${h}%"></div>`;
  }).join('');

  const skillsHtml = (d.skills||[]).filter(([,l])=>l>0).map(([name,lvl]) => `
    <div class="skill-row">
      <div class="skill-name">${name}</div>
      <div class="skill-bar-wrap"><div class="skill-bar-fill" style="width:${lvl/4*100}%"></div></div>
      <div class="skill-lvl">${LEVEL[lvl]||''}</div>
    </div>`).join('');

  const achievementsHtml = d.achievements.length
    ? [...d.achievements].reverse().map(a => `
        <div class="ach-item">
          <div class="ach-month">${a.month||'—'}</div>
          <div class="ach-body">
            <div class="ach-title">${a.title}</div>
            <div class="ach-tags">
              ${(a.skills||[]).map(s=>`<span class="ach-tag skill">${s}</span>`).join('')}
              ${a.type?`<span class="ach-tag type-${a.type}">${TYPE_LABELS[a.type]||a.type}</span>`:''}
              ${a.scope==='external'?`<span class="ach-tag">External</span>`:''}
              ${a.scope==='cross-team'?`<span class="ach-tag">Cross-team</span>`:''}
            </div>
            ${a.impact?`<div class="ach-impact">${a.impact}</div>`:''}
          </div>
        </div>`).join('')
    : '<div style="font-size:12.5px;color:var(--muted);font-style:italic">No achievements recorded yet.</div>';

  const projectsHtml = (row.projects_list||[]).length
    ? row.projects_list.map(p=>`<span class="proj-chip">${p}</span>`).join('')
    : '<span style="font-size:12.5px;color:var(--muted)">No active projects</span>';

  document.getElementById('content').innerHTML = `
    <div class="profile-hero">
      <div class="profile-photo">
        <img src="${d.photo||avatarUrl(d.name)}" alt="${d.initials}"
          onerror="this.style.display='none';this.parentElement.textContent='${d.initials}'">
      </div>
      <div>
        <div class="profile-name">${d.name}</div>
        <div class="profile-role">${d.role}</div>
        <div class="profile-status ${d.status}">${d.status.charAt(0).toUpperCase()+d.status.slice(1)}</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">This week's signals</div>
      <div class="card">
        <div class="signals-grid">
          <div class="signal-card">
            <div class="signal-label">Energy</div>
            <div class="signal-val" style="font-size:16px;padding-top:4px">${energyLabel[d.energy]||'Steady'}</div>
            <div class="signal-sub ${energyCls[d.energy]||'warn'}">${d.energy==='low'?'Needs attention':d.energy==='high'?'Feeling good':'On track'}</div>
          </div>
          <div class="signal-card">
            <div class="signal-label">Load</div>
            <div class="signal-val">${d.load}<span style="font-size:14px;font-weight:400;color:var(--muted)">%</span></div>
            <div class="signal-sub ${d.load>95?'crit':d.load>85?'warn':'ok'}">${d.load>95?'Above ceiling':d.load>85?'Near ceiling':'Within range'}</div>
          </div>
          <div class="signal-card">
            <div class="signal-label">Meetings</div>
            <div class="signal-val" style="font-size:15px;padding-top:4px">${(d.meetingLoad||'balanced').replace('-',' ')}</div>
            <div class="signal-sub">${mlLabel[d.meetingLoad]||''}</div>
          </div>
        </div>
        <div style="margin-top:14px">
          <div style="font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:0.04em">7-week energy trend</div>
          <div class="history-bar">${historyHtml}</div>
        </div>
        <div style="margin-top:12px;font-size:12.5px;color:var(--muted)">
          ${d.context} active project${d.context!==1?'s':''} · ${d.pto} days since last PTO
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Skill matrix</div>
      <div class="card">
        <div class="skill-list">${skillsHtml||'<div style="color:var(--muted);font-size:12.5px">No skills recorded yet.</div>'}</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Year's achievements</div>
      <div class="card">
        <div class="achievement-list">${achievementsHtml}</div>
      </div>
    </div>

    <div style="text-align:center;margin-top:28px">
      <button onclick="backToSelector()" style="font-family:inherit;font-size:12.5px;padding:8px 18px;border:1px solid var(--line);border-radius:var(--r-md);background:var(--surface);color:var(--muted);cursor:pointer">View another profile</button>
    </div>
  `;
}

function backToSelector(){
  window.history.replaceState(null,'','profile.html');
  document.getElementById('content').innerHTML = `
    <div class="selector-wrap" id="selectorWrap">
      <div class="selector-title">My profile</div>
      <div class="selector-sub">Search your name to view your profile</div>
      <input class="selector-search" id="selectorSearch" placeholder="Start typing your name…" autocomplete="off">
      <div class="selector-list" id="selectorList"></div>
    </div>`;
  setupSelector();
}

loadDesigners();
</script>
</body>
</html>
